<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Liste</title>
</head>
<body>

<h1>Liste</h1>

<input type="text" id="eingabe" placeholder="Text eingeben">

<button onclick="hinzufuegen()">Hinzufügen</button>
<button onclick="entfernen()">Letztes löschen</button>

<div id="liste"></div>

<script>
let liste = [];

function hinzufuegen() {
    let text = document.getElementById("eingabe").value;

    liste.push(text); 
    document.getElementById("eingabe").value = "";
    anzeigen();
}

function entfernen() {
    if (liste.length === 0) {
        return;
    }

    liste.pop();
    anzeigen();
}

function anzeigen() {
    let ausgabe = document.getElementById("liste");
    ausgabe.innerHTML = "";

    for (let i = 0; i < liste.length; i++) {
        ausgabe.innerHTML += liste[i] + "<br>";
    }
}
</script>

</body>
</html>
