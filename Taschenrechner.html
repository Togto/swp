<!DOCTYPE html>

<html lang="en">

 

<head>

       
    <meta charset="UTF-8" />

       
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Document</title>

     
</head>

 

 

<body>

        <h1>Liste</h1>

        <input type="number" id="eingabe" placeholder="Enter a number" />

        <select name="operation" id="operation">

              <option value="+">+</option>

              <option value="-">-</option>

              <option value="*">*</option>

              <option value="/">/</option>

              <option value=""></option>

        <option value=""></option>




           
    </select>

        <button onClick="berechnen()">berechnen</button>

        <div id="liste"></div>

     

       
    <script>

        let werte = [];

        let summe = 0;



        function berechnen() {

            let eingabeFeld = parseFloat(document.getElementById("eingabe").value);

            let operation = document.getElementById("operation").value;

            switch (operation) {

                case "+":

                    summe += eingabeFeld;

                    break;

                case "-":

                    summe -= eingabeFeld;

                    break;

                case "*":

                    summe *= eingabeFeld;

                    break;

                case "/":

                    if (eingabeFeld !== 0) {

                        summe /= eingabeFeld;

                    } else {

                        alert("Division durch Null ist nicht erlaubt!");

                        return;

                    }

                    break;

                default:

                    alert("Ungültige Operation!");

                    return;

            }



            werte.push(operation);

            werte.push(eingabeFeld);

            werte.push("=" + summe);

            listeAktualisieren();

        }



        function listeAktualisieren() {

            document.getElementById("liste").innerHTML = "";

            for (let i = 0; i < werte.length; i++) {

                document.getElementById("liste").innerHTML += werte[i] + "<br>";

                console.log(werte[i]);

            }

        }

    </script>

     
</body>

</html>
